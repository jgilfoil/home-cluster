kubeconfig: .private/codex-mcp/kubeconfig
repo_root: ../..

exec:
  allowed_namespaces:
    - default
    - media
    - mymindinai
    - mymindinai-dev
  denied_namespaces:
    - cert-manager
    - database
    - flux-system
    - kube-node-lease
    - kube-public
    - kube-system
    - network
    - observability
    - rook-ceph
    - storage

limits:
  log_tail_default: 100
  log_tail_max: 200
  event_max: 100
  exec_timeout_seconds: 10
  output_max_bytes: 32768

prometheus:
  url: null
  timeout_seconds: 10
