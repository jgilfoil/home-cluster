---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  MCP_DIR: "{{.ROOT_DIR}}/tools/home-cluster-mcp"
  MCP_CONFIG_FILE: "{{.MCP_DIR}}/config.sample.yaml"
  MCP_PRIVATE_DIR: "{{.PRIVATE_DIR}}/codex-mcp"
  MCP_KUBECONFIG_FILE: "{{.MCP_PRIVATE_DIR}}/kubeconfig"
  MCP_PYTHON_BIN: "{{.VIRTUAL_ENV}}/bin/python"
  MCP_SERVER_BIN: "{{.VIRTUAL_ENV}}/bin/home-cluster-mcp"
  MCP_TOKEN_DURATION: 8h
  MCP_TOKEN_SECRET_NAME: codex-mcp-token

tasks:

  install:
    desc: Install the home-cluster MCP package and test extras
    cmds:
      - task: :workstation:venv
      - '"{{.MCP_PYTHON_BIN}}" -m pip install --upgrade --editable "{{.MCP_DIR}}[test]"'
    preconditions:
      - { msg: "Missing MCP package", sh: "test -f {{.MCP_DIR}}/pyproject.toml" }

  kubeconfig:
    desc: Create a short-lived kubeconfig for the Codex MCP service account
    cmds:
      - mkdir -p "{{.MCP_PRIVATE_DIR}}"
      - |
        set -eu
        TOKEN="$(kubectl --kubeconfig "{{.KUBECONFIG_FILE}}" -n default create token codex-mcp --duration={{.MCP_TOKEN_DURATION}})"
        SERVER="$(kubectl --kubeconfig "{{.KUBECONFIG_FILE}}" config view --raw --minify -o jsonpath='{.clusters[0].cluster.server}')"
        CA_DATA="$(kubectl --kubeconfig "{{.KUBECONFIG_FILE}}" config view --raw --minify -o jsonpath='{.clusters[0].cluster.certificate-authority-data}')"
        if [ -z "$CA_DATA" ]; then
          echo "Current kubeconfig does not expose certificate-authority-data with --raw --minify" >&2
          exit 1
        fi
        TMP_FILE="$(mktemp "{{.MCP_PRIVATE_DIR}}/.kubeconfig.XXXXXX")"
        trap 'rm -f "$TMP_FILE"' EXIT
        cat > "$TMP_FILE" <<EOF
        apiVersion: v1
        kind: Config
        clusters:
        - name: home-cluster
          cluster:
            server: ${SERVER}
            certificate-authority-data: ${CA_DATA}
        users:
        - name: codex-mcp
          user:
            token: ${TOKEN}
        contexts:
        - name: codex-mcp@home-cluster
          context:
            cluster: home-cluster
            user: codex-mcp
            namespace: default
        current-context: codex-mcp@home-cluster
        EOF
        chmod 600 "$TMP_FILE"
        install -m 600 "$TMP_FILE" "{{.MCP_KUBECONFIG_FILE}}"
        rm -f "$TMP_FILE"
        trap - EXIT
        echo "Wrote {{.MCP_KUBECONFIG_FILE}}"
    preconditions:
      - { msg: "Missing kubectl", sh: "command -v kubectl" }
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG_FILE}}" }

  kubeconfig-durable:
    desc: Create a durable kubeconfig from the Codex MCP service-account token Secret
    cmds:
      - mkdir -p "{{.MCP_PRIVATE_DIR}}"
      - |
        set -eu
        TOKEN_DATA="$(kubectl --kubeconfig "{{.KUBECONFIG_FILE}}" -n default get secret "{{.MCP_TOKEN_SECRET_NAME}}" -o jsonpath='{.data.token}')"
        CA_DATA="$(kubectl --kubeconfig "{{.KUBECONFIG_FILE}}" -n default get secret "{{.MCP_TOKEN_SECRET_NAME}}" -o jsonpath='{.data.ca\.crt}')"
        SERVER="$(kubectl --kubeconfig "{{.KUBECONFIG_FILE}}" config view --raw --minify -o jsonpath='{.clusters[0].cluster.server}')"
        if [ -z "$TOKEN_DATA" ] || [ -z "$CA_DATA" ]; then
          echo "Service-account token Secret {{.MCP_TOKEN_SECRET_NAME}} is not populated yet" >&2
          exit 1
        fi
        TOKEN="$(printf '%s' "$TOKEN_DATA" | base64 --decode)"
        TMP_FILE="$(mktemp "{{.MCP_PRIVATE_DIR}}/.kubeconfig.XXXXXX")"
        trap 'rm -f "$TMP_FILE"' EXIT
        cat > "$TMP_FILE" <<EOF
        apiVersion: v1
        kind: Config
        clusters:
        - name: home-cluster
          cluster:
            server: ${SERVER}
            certificate-authority-data: ${CA_DATA}
        users:
        - name: codex-mcp
          user:
            token: ${TOKEN}
        contexts:
        - name: codex-mcp@home-cluster
          context:
            cluster: home-cluster
            user: codex-mcp
            namespace: default
        current-context: codex-mcp@home-cluster
        EOF
        chmod 600 "$TMP_FILE"
        install -m 600 "$TMP_FILE" "{{.MCP_KUBECONFIG_FILE}}"
        rm -f "$TMP_FILE"
        trap - EXIT
        echo "Wrote durable {{.MCP_KUBECONFIG_FILE}}"
    preconditions:
      - { msg: "Missing kubectl", sh: "command -v kubectl" }
      - { msg: "Missing kubeconfig", sh: "test -f {{.KUBECONFIG_FILE}}" }

  run:
    desc: Run the home-cluster MCP stdio server locally
    dir: "{{.ROOT_DIR}}"
    env:
      HOME_CLUSTER_MCP_CONFIG: "{{.MCP_CONFIG_FILE}}"
    cmd: '"{{.MCP_SERVER_BIN}}" --config "{{.MCP_CONFIG_FILE}}"'
    preconditions:
      - { msg: "Missing MCP config", sh: "test -f {{.MCP_CONFIG_FILE}}" }
      - { msg: "Missing MCP server; run task mcp:install", sh: "test -x {{.MCP_SERVER_BIN}}" }

  test:
    desc: Run home-cluster MCP unit tests
    dir: "{{.ROOT_DIR}}"
    cmd: '"{{.MCP_PYTHON_BIN}}" -m pytest "{{.MCP_DIR}}/tests"'
    preconditions:
      - { msg: "Missing MCP package", sh: "test -f {{.MCP_DIR}}/pyproject.toml" }
      - { msg: "Missing MCP test environment; run task mcp:install", sh: "test -x {{.MCP_PYTHON_BIN}}" }
