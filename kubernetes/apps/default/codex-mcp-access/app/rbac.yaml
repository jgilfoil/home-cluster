---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: codex-mcp
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: codex-mcp-read
rules:
  - apiGroups: [""]
    resources:
      - endpoints
      - events
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - services
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources:
      - daemonsets
      - deployments
      - replicasets
      - statefulsets
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingressclasses
      - networkpolicies
    verbs: ["get", "list"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list"]
  - apiGroups: ["events.k8s.io"]
    resources:
      - events
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["get", "list"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs: ["get", "list"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs: ["get", "list"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - buckets
      - gitrepositories
      - helmcharts
      - helmrepositories
      - ocirepositories
    verbs: ["get", "list"]
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources:
      - alerts
      - providers
      - receivers
    verbs: ["get", "list"]
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificaterequests
      - clusterissuers
      - issuers
    verbs: ["get", "list"]
  - apiGroups: ["acme.cert-manager.io"]
    resources:
      - challenges
      - orders
    verbs: ["get", "list"]
  - apiGroups: ["ceph.rook.io"]
    resources:
      - cephblockpools
      - cephclients
      - cephclusters
      - cephfilesystems
      - cephnfses
      - cephobjectrealms
      - cephobjectstores
      - cephobjectstoreusers
      - cephobjectzonegroups
      - cephobjectzones
      - cephrbdmirrors
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: codex-mcp-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: codex-mcp-read
subjects:
  - kind: ServiceAccount
    name: codex-mcp
    namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codex-mcp-exec
  namespace: default
rules:
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codex-mcp-exec
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codex-mcp-exec
subjects:
  - kind: ServiceAccount
    name: codex-mcp
    namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codex-mcp-exec
  namespace: media
rules:
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codex-mcp-exec
  namespace: media
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codex-mcp-exec
subjects:
  - kind: ServiceAccount
    name: codex-mcp
    namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codex-mcp-exec
  namespace: mymindinai
rules:
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codex-mcp-exec
  namespace: mymindinai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codex-mcp-exec
subjects:
  - kind: ServiceAccount
    name: codex-mcp
    namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codex-mcp-exec
  namespace: mymindinai-dev
rules:
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codex-mcp-exec
  namespace: mymindinai-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codex-mcp-exec
subjects:
  - kind: ServiceAccount
    name: codex-mcp
    namespace: default
